<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Detecter</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        background-color: #1a1a1a;
      }

      .container {
        background-color: #2e2e2e;
        color: #ffff;
        padding: 20px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
      }

      h1 {
        margin-bottom: 2rem;
      }

      label {
        margin-bottom: 10px;
      }

      input,
      button {
        padding: 5px;
      }
      button{
        margin-bottom: 10px;
      }

      input {
        margin-bottom: 10px;
      }

      #message {
        margin-bottom: 7px;
        font-size: larger;
      }
      #wish {
        font-size: x-large;
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Birthday Calculater</h1>
      <label for="birthday">Birth Day:</label>
      <input type="date" id="birthday" />
      <button id="submit-btn">Get My Birthday</button>
      <span id="message"></span>
      <span id="wish"></span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
